<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Test</title>
<style>
  body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
  video { width: 100%; max-width: 400px; background: #111; }
  button { padding: 20px 40px; font-size: 18px; font-weight: bold; background: #00c853; border: none; border-radius: 12px; cursor: pointer; }
  #status { color: #fff; font-family: sans-serif; font-size: 14px; text-align: center; padding: 0 20px; }
</style>
</head>
<body>
<div id="status">Tap the button to test camera</div>
<video id="v" autoplay playsinline muted></video>
<button onclick="go()">Open Camera</button>
<script>
async function go() {
  const status = document.getElementById('status');
  status.textContent = 'Requesting camera...';
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    document.getElementById('v').srcObject = s;
    status.textContent = 'Camera working!';
  } catch(e) {
    status.textContent = 'Error: ' + e.name + ' — ' + e.message;
  }
}
</script>
</body>
</html>
